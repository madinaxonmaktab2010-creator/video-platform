<!DOCTYPE html>
<html>
<head>
    <title>{{ teacher.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .profile-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
        }
        .video-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            transition: transform 0.2s;
        }
        .video-card:hover { transform: translateY(-3px); }
        .btn-purple {
            background: #7c3aed;
            border: none;
            color: white;
            border-radius: 20px;
        }
        .btn-purple:hover { background: #6d28d9; color: white; }
        a { color: #a78bfa; }
        .section-title {
            border-left: 4px solid #7c3aed;
            padding-left: 10px;
        }
    </style>
</head>
<body>
<nav class="navbar px-4 py-3">
    <a class="navbar-brand fw-bold text-white" href="/">🎬 AI & CS Platform</a>
    <a href="/" class="btn btn-sm btn-outline-light">← Back to Home</a>
</nav>

<div class="container mt-4">
    <div class="profile-card mb-4">
        <h2>👨‍🏫 {{ teacher.name }}</h2>
        <p class="text-muted">{{ teacher.bio or 'No bio yet.' }}</p>
        <p>📹 Total Videos: <b>{{ teacher.videos|length }}</b></p>
    </div>

    <h4 class="section-title mb-3">Videos by {{ teacher.name }}</h4>
    <div class="row">
        {% for video in teacher.videos %}
        <div class="col-md-4 mb-3">
            <div class="video-card">
                <h6 class="text-white">{{ video.title }}</h6>
                <p class="text-muted" style="font-size:0.85rem;">{{ video.description }}</p>
                <a href="/video/{{ video.id }}" class="btn btn-purple btn-sm">▶️ Watch</a>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No videos yet!</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
