<!DOCTYPE html>
<html>
<head>
    <title>Upload Video</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .upload-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
        }
        label { color: rgba(255,255,255,0.7); }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.15);
            color: white;
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.2rem rgba(124,58,237,0.3);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-select option { background: #302b63; }
        .btn-purple {
            background: #7c3aed;
            border: none;
            color: white;
            border-radius: 20px;
            padding: 10px 30px;
        }
        .btn-purple:hover { background: #6d28d9; color: white; }
        a { color: #a78bfa; }
    </style>
</head>
<body>
<nav class="navbar px-4 py-3">
    <a class="navbar-brand fw-bold text-white" href="/">🎬 AI & CS Platform</a>
    <a href="/" class="btn btn-sm btn-outline-light">← Back to Home</a>
</nav>

<div class="container mt-5">
    <div class="upload-card" style="max-width:600px; margin:auto;">
        <h2 class="mb-4">📤 Upload Video</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Video Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter title" required>
            </div>
            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Enter description"></textarea>
            </div>
            <div class="mb-3">
                <label>Subject</label>
                <select name="subject" class="form-select">
                    <option value="Mathematics">📐 Mathematics</option>
                    <option value="Physics">⚛️ Physics</option>
                    <option value="Computer Science">💻 Computer Science</option>
                    <option value="General">📚 General</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Video File</label>
                <input type="file" name="video" class="form-control" accept="video/*" required>
            </div>
            <button type="submit" class="btn-purple">Upload Video</button>
        </form>
    </div>
</div>
</body>
</html>
