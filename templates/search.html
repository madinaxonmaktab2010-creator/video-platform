<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .video-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .video-card:hover { transform: translateY(-5px); }
        .video-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }
        .card-body { padding: 12px; }
        .btn-purple {
            background: #7c3aed;
            border: none;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            padding: 4px 14px;
        }
        .btn-purple:hover { background: #6d28d9; color: white; }
        .section-title {
            border-left: 4px solid #7c3aed;
            padding-left: 10px;
        }
        .search-bar {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px 20px;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 80%;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
        a { color: #a78bfa; }
    </style>
</head>
<body>
<nav class="navbar px-4 py-3">
    <a class="navbar-brand fw-bold text-white" href="/">🎬 AI & CS Platform</a>
    <a href="/" class="btn btn-sm btn-outline-light">← Back to Home</a>
</nav>

<div class="container mt-4">
    <div class="search-bar d-flex align-items-center mb-4 mx-auto" style="max-width:600px;">
        <form action="/search" method="GET" class="w-100 d-flex">
            <input type="text" name="q" placeholder="🔍 Search videos..." value="{{ query }}">
            <button class="btn btn-sm btn-purple" type="submit">Search</button>
        </form>
    </div>

    <h4 class="section-title mb-4">Search Results for "{{ query }}"</h4>

    <div class="row">
        {% for video in videos %}
        <div class="col-md-4 mb-4">
            <div class="video-card">
                <video controls preload="metadata">
                    <source src="/uploads/{{ video.filename }}" type="video/mp4">
                </video>
                <div class="card-body">
                    <p class="fw-bold text-white mb-1">{{ video.title }}</p>
                    <p class="text-muted" style="font-size:0.85rem;">{{ video.description }}</p>
                    <p style="color:#a78bfa; font-size:0.8rem;">👨‍🏫 <a href="/teacher/{{ video.teacher.id }}">{{ video.teacher.name }}</a></p>
                    <span class="badge mb-2" style="background:#7c3aed; border-radius:10px;">{{ video.subject }}</span><br>
                    <a href="/video/{{ video.id }}" class="btn btn-purple mt-1">▶️ Watch & Test</a>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No videos found for "{{ query }}"!</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
