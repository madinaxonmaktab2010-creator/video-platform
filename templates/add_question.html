<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .question-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }
        label { color: rgba(255,255,255,0.7); }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.15);
            color: white;
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.2rem rgba(124,58,237,0.3);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .form-select option { background: #302b63; }
        .btn-purple {
            background: #7c3aed;
            border: none;
            color: white;
            border-radius: 20px;
            padding: 10px 30px;
        }
        .btn-purple:hover { background: #6d28d9; color: white; }
        a { color: #a78bfa; }
    </style>
</head>
<body>
<nav class="navbar px-4 py-3">
    <a class="navbar-brand fw-bold text-white" href="/">🎬 AI & CS Platform</a>
    <a href="/video/{{ video_id }}" class="btn btn-sm btn-outline-light">← Back to Video</a>
</nav>

<div class="container mt-5">
    <div class="question-card">
        <h2 class="mb-4">➕ Add Question</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-success">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label>Question</label>
                <input type="text" name="question" class="form-control" placeholder="Enter your question" required>
            </div>
            <div class="mb-3">
                <label>Option A</label>
                <input type="text" name="option_a" class="form-control" placeholder="Option A" required>
            </div>
            <div class="mb-3">
                <label>Option B</label>
                <input type="text" name="option_b" class="form-control" placeholder="Option B" required>
            </div>
            <div class="mb-3">
                <label>Option C</label>
                <input type="text" name="option_c" class="form-control" placeholder="Option C" required>
            </div>
            <div class="mb-3">
                <label>Option D</label>
                <input type="text" name="option_d" class="form-control" placeholder="Option D" required>
            </div>
            <div class="mb-3">
                <label>Correct Answer</label>
                <select name="correct" class="form-select">
                    <option value="A">A is correct</option>
                    <option value="B">B is correct</option>
                    <option value="C">C is correct</option>
                    <option value="D">D is correct</option>
                </select>
            </div>
            <button type="submit" class="btn-purple">Add Question</button>
        </form>
    </div>
</div>
</body>
</html>
