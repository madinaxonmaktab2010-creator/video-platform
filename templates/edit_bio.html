<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .navbar {
            background: rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .edit-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }
        label { color: rgba(255,255,255,0.7); }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.15);
            color: white;
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.2rem rgba(124,58,237,0.3);
        }
        .form-select option { background: #302b63; }
        .btn-purple {
            background: #7c3aed;
            border: none;
            color: white;
            border-radius: 20px;
            padding: 10px 30px;
        }
        .btn-purple:hover { background: #6d28d9; color: white; }
        a { color: #a78bfa; }
    </style>
</head>
<body>
<nav class="navbar px-4 py-3">
    <a class="navbar-brand fw-bold text-white" href="/">🎬 AI & CS Platform</a>
    <a href="/" class="btn btn-sm btn-outline-light">← Back to Home</a>
</nav>

<div class="container mt-5">
    <div class="edit-card">
        <h2 class="mb-4">✏️ Edit Your Profile</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-success">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label>Bio</label>
                <textarea name="bio" class="form-control" rows="4" 
                    placeholder="Write something about yourself...">{{ teacher.bio or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label>Your Subject</label>
                <select name="subject" class="form-select">
                    <option value="Mathematics" {% if teacher.subject == 'Mathematics' %}selected{% endif %}>📐 Mathematics</option>
                    <option value="Physics" {% if teacher.subject == 'Physics' %}selected{% endif %}>⚛️ Physics</option>
                    <option value="Computer Science" {% if teacher.subject == 'Computer Science' %}selected{% endif %}>💻 Computer Science</option>
                    <option value="General" {% if teacher.subject == 'General' %}selected{% endif %}>📚 General</option>
                </select>
            </div>
            <button type="submit" class="btn-purple">Save Changes</button>
        </form>
        <br>
        <a href="/my_teacher_profile">← Back to My Profile</a>
    </div>
</div>
</body>
</html>
